services:
  prometheus:
    image: prom/prometheus:latest
    container_name: cs3-prometheus
    ports:
      - "22124:9090"
    volumes:
      - /home/group04/prometheus-live.yml:/etc/prometheus/prometheus.yml:ro
      - /home/group04/prometheus-data:/prometheus

  node-exporter:
    image: prom/node-exporter:latest
    container_name: cs3-node-exporter
    command:
      - '--path.rootfs=/host'
    pid: host
    restart: unless-stopped
    volumes:
      - '/:/host:ro,rslave'
    ports:
      - "22125:9100"

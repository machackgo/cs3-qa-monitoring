name: CS3 CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-and-verify:
    runs-on: [self-hosted, linux, x64, cs3]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Runner info
        run: |
          echo "Runner is working"
          whoami
          hostname
          pwd

      - name: Show repository structure
        run: |
          ls -la
          ls -la /home/group04/cs3/cs3-qa-monitoring
          ls -la /home/group04/cs3/cs3-qa-monitoring/qa-local
          ls -la /home/group04/cs3/cs3-qa-monitoring/qa-api
          ls -la /home/group04/cs3/cs3-qa-monitoring/monitoring

      - name: Check Docker
        run: |
          docker --version
          docker compose version
          docker ps

      - name: Deploy qa-local
        run: |
          cd /home/group04/cs3/cs3-qa-monitoring/qa-local
          docker compose down || true
          docker compose up -d --build
          docker compose ps

      - name: Deploy qa-api
        run: |
          cd /home/group04/cs3/cs3-qa-monitoring/qa-api
          docker compose down || true
          docker compose up -d --build
          docker compose ps

      - name: Deploy monitoring
        run: |
          cd /home/group04/cs3/cs3-qa-monitoring/monitoring
          docker compose down || true
          docker compose up -d
          docker compose ps

      - name: Reconnect Prometheus to app networks
        run: |
          docker network connect qa-api_default cs3-prometheus || true
          docker network connect qa-local_default cs3-prometheus || true

      - name: Wait for services
        run: |
          sleep 20

      - name: Check qa-local health
        run: |
          docker run --rm --network host curlimages/curl:8.10.1 -fsS http://127.0.0.1:22083/health

      - name: Check qa-api health
        run: |
          docker run --rm --network host curlimages/curl:8.10.1 -fsS http://127.0.0.1:22082/health

      - name: Check qa-local metrics
        run: |
          docker run --rm --network host curlimages/curl:8.10.1 -fsS http://127.0.0.1:22085/metrics | grep qa_local

      - name: Check qa-api metrics
        run: |
          docker run --rm --network host curlimages/curl:8.10.1 -fsS http://127.0.0.1:22084/metrics | grep qa_api

      - name: Check node-exporter metrics
        run: |
          docker run --rm --network host curlimages/curl:8.10.1 -fsS http://127.0.0.1:22087/metrics | grep node_

      - name: Check Prometheus ready
        run: |
          docker run --rm --network host curlimages/curl:8.10.1 -fsS http://127.0.0.1:22086/-/ready

      - name: Check Prometheus targets
        run: |
          docker run --rm --network host curlimages/curl:8.10.1 -fsS http://127.0.0.1:22086/api/v1/targets > targets.json
          cat targets.json | head -200
          grep -q '"health":"up"' targets.json

      - name: Show Prometheus logs for Grafana remote_write status
        run: |
          docker logs cs3-prometheus --since 2m > prometheus.log 2>&1 || true
          cat prometheus.log
          grep -Ei "remote|grafana|401|403|unauthorized|forbidden|failed" prometheus.log || true

      - name: Show running containers
        run: |
          docker ps
